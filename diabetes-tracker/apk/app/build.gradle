plugins {
    id 'com.android.application'
}

android {
    namespace 'com.saadbinriaz.sugartracker'
    compileSdk 34

    defaultConfig {
        applicationId "com.saadbinriaz.sugartracker"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "2.0"
    }

    signingConfigs {
        release {
            storeFile file('../build/sugartracker.keystore')
            storePassword 'sugartracker'
            keyAlias 'sugartracker'
            keyPassword 'sugartracker'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.9.0'
}
