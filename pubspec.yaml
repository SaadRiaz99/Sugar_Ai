name: sugar_ai
description: SugarAI - Offline Diabetes Risk Assessment Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  fl_chart: ^0.68.0
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  pdf: ^3.10.0
  printing: ^5.12.0
  share_plus: ^9.0.0
  tflite_flutter: ^0.10.4
  google_fonts: ^6.1.0
  encrypt: ^5.0.3
  uuid: ^4.3.0
  timeago: ^3.6.0
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
