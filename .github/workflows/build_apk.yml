name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Backup custom files
        run: |
          mkdir -p /tmp/backup
          cp pubspec.yaml /tmp/backup/
          cp -r lib /tmp/backup/
          cp -r assets /tmp/backup/ 2>/dev/null || true
          cp analysis_options.yaml /tmp/backup/ 2>/dev/null || true

      - name: Create fresh Flutter project
        run: |
          rm -rf android/ test/
          flutter create --project-name sugar_ai --org com.sugarai --platforms android .
          flutter pub get

      - name: Restore custom code
        run: |
          cp /tmp/backup/pubspec.yaml pubspec.yaml
          rm -rf lib/ assets/
          cp -r /tmp/backup/lib .
          cp -r /tmp/backup/assets . 2>/dev/null || true
          flutter pub get

      - name: Fix minSdkVersion for tflite_flutter
        run: |
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 26/' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 26/' android/app/build.gradle.kts 2>/dev/null || true

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sugar_ai_apk
          path: build/app/outputs/flutter-apk/app-release.apk
