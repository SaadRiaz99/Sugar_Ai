name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Generate missing platform files
        run: |
          flutter create --project-name sugar_ai --org com.sugarai --platforms android /tmp/sugar_ai_template
          cp -r /tmp/sugar_ai_template/android/* android/
          cp -r /tmp/sugar_ai_template/test/* test/ 2>/dev/null || true
          cp /tmp/sugar_ai_template/analysis_options.yaml analysis_options.yaml 2>/dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sugar_ai_apk
          path: build/app/outputs/flutter-apk/app-release.apk
